name: Build and Push to GHCR & Docker Hub

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master

      - name: Log in to GHCR
        uses: docker/login-action@master
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # - name: Login to Docker Hub
      #   uses: docker/login-action@master
      #   with:
      #     registry: docker.io
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}

      # - name: Login to Quay
      #   uses: docker/login-action@master
      #   with:
      #     registry: quay.io
      #     username: ${{ secrets.QUAY_USERNAME }}
      #     password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract metadata (tags, labels) — Alpine
        id: meta-alpine
        uses: docker/metadata-action@master
        with:
          images: |
            ghcr.io/${{ github.repository }}
            # docker.io/${{ github.repository }}
            # quay.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=alpine

      - name: Extract metadata (tags, labels) — Debian
        id: meta-debian
        uses: docker/metadata-action@master
        with:
          images: |
            ghcr.io/${{ github.repository }}
            # docker.io/${{ github.repository }}
            # quay.io/${{ github.repository }}
          tags: |
            type=raw,value=debian

      - name: Build and push Alpine image
        uses: docker/build-push-action@master
        with:
          context: .
          file: ./Containerfile.alpine
          push: true
          tags: ${{ steps.meta-alpine.outputs.tags }}
          labels: ${{ steps.meta-alpine.outputs.labels }}

      - name: Build and push Debian image
        uses: docker/build-push-action@master
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ steps.meta-debian.outputs.tags }}
          labels: ${{ steps.meta-debian.outputs.labels }}
